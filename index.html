<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart Rosary</title>
  <meta name="description" content="Smart Rosary – inteligentny różaniec. Dashboard i instalator firmware.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      /* Palette aligned with favicon blue (#0974cc), darker background */
      --bg: linear-gradient(180deg, #0f5aa0 0%, #0b4f8f 55%, #09457e 100%);
      --text: #14223d; /* deep navy for contrast on white card */
      --muted: #5b6b86;
      --card: #ffffffcc;
      --border: #b7d6f5; /* slightly deeper tint */
      --accent: #0974cc; /* match logo blue */
      --accent-contrast: #ffffff;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: var(--bg); }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      color: var(--text);
      background: var(--bg);
      min-height: 100vh; /* fallback */
      min-height: 100dvh; /* fill dynamic viewport on mobile */
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: flex-end; /* align language selector to the right */
      gap: 1rem;
      padding: 1rem 1.25rem;
      max-width: 960px;
      margin: 0 auto;
      width: 100%;
    }

    /* removed round badge/logo in header */

    .lang {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #fff; /* make label text white */
      font-size: 0.9rem;
    }

    select {
      padding: 0.4rem 0.6rem;
      border: 1px solid rgba(255,255,255,0.6);
      border-radius: 8px;
      background: transparent;
      color: #fff; /* white text in the control */
      font-size: 0.95rem;
    }
    select:focus { outline: 2px solid rgba(255,255,255,0.85); outline-offset: 2px; }
    select option { color: #111; }

    main {
      display: grid;
      place-items: center;
      padding: 2rem 1.25rem 3rem;
      flex: 1;
    }

    .card {
      width: 100%;
      max-width: 960px;
      background: var(--card);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 10px 30px #00000014;
    }

    .hero {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .hero .site-title {
      font-size: 2rem;
      margin: 0 0 0.5rem 0;
    }
    .hero .hero-icon {
      display: inline-block;
      width: 80px;
      height: 80px;
      margin-bottom: 0.5rem;
    }
    .hero .tagline {
      margin: 0.25rem 0 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .actions {
      margin-top: 1.75rem;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      align-items: start;
      gap: 0.75rem;
    }

    .action-stack {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      min-width: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-decoration: none;
      padding: 0.85rem 1rem;
      min-height: 48px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: white;
      color: var(--text);
      font-weight: 600;
      transition: transform 0.06s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 8px #0000000a;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px #00000014; }
    .btn.primary { background: var(--accent); color: var(--accent-contrast); border-color: transparent; }
    .btn.disabled { background: #f9fafb; color: #9ca3af; border-style: dashed; cursor: not-allowed; pointer-events: none; }

    .howto-note {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.35;
      text-align: center;
    }

    .notice {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff7ed;
      color: #7c2d12;
      display: none;
    }
    .notice.show { display: block; }
    .notice .actions { margin-top: 0.75rem; display: flex; gap: 0.5rem; }
    .notice .actions .btn { padding: 0.55rem 0.8rem; font-weight: 500; }

    footer {
      padding: 1rem 1.25rem;
      text-align: center;
      color: rgba(255,255,255,0.88);
      font-size: 0.9rem;
    }
    .deploy-info {
      margin-top: 0.35rem;
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      opacity: 0.78;
    }
    footer a {
      color: inherit;
      margin-left: 0.75rem;
      text-underline-offset: 0.2em;
    }
    footer a:hover { color: #fff; }

    @media (max-width: 640px) {
      header {
        padding: 0.65rem 0.9rem;
      }

      main {
        padding: 1.85rem 0.85rem 0;
        place-items: start center;
      }

      .card {
        padding: 1rem;
        border-radius: 12px;
      }

      .hero {
        margin-bottom: 0.85rem;
      }

      .hero .site-title {
        font-size: 1.55rem;
        margin-bottom: 0.3rem;
      }

      .hero .hero-icon {
        width: 52px;
        height: 52px;
        margin-bottom: 0.25rem;
      }

      .hero .tagline {
        font-size: 0.92rem;
        line-height: 1.25;
      }

      .actions {
        grid-template-columns: 1fr;
        margin-top: 0.85rem;
        gap: 0.48rem;
      }

      .action-stack {
        gap: 0.28rem;
      }

      .btn {
        min-height: 40px;
        padding: 0.55rem 0.8rem;
        font-size: 0.92rem;
      }

      .howto-note {
        font-size: 0.72rem;
        line-height: 1.18;
      }

      footer {
        padding: 0.55rem 0.9rem;
        font-size: 0.78rem;
      }

      .deploy-info {
        display: none;
      }
    }

    @media (max-width: 640px) and (max-height: 720px) and (orientation: portrait) {
      header {
        padding-block: 0.45rem;
      }

      main {
        padding-block: 1.2rem 0;
      }

      .card {
        padding: 0.75rem;
      }

      .hero {
        margin-bottom: 0.55rem;
      }

      .hero .site-title {
        font-size: 1.35rem;
        margin-bottom: 0.2rem;
      }

      .hero .hero-icon {
        width: 38px;
        height: 38px;
        margin-bottom: 0.15rem;
      }

      .hero .tagline {
        font-size: 0.82rem;
      }

      .actions {
        margin-top: 0.55rem;
        gap: 0.35rem;
      }

      .btn {
        min-height: 36px;
        padding-block: 0.42rem;
      }

      .howto-note {
        font-size: 0.68rem;
      }

      footer {
        padding-block: 0.35rem;
      }
    }

    @media (min-width: 900px) {
      .card { max-width: 1120px; }
      .actions { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .actions .btn { white-space: nowrap; }
    }
  </style>
</head>
<body>
  <header>
    <div class="lang">

        <a class="btn" id="intentions-editor" href="https://drlechk.github.io/smartrosary-intentions-editor/" target="_blank" rel="noopener" data-i18n="intentionsEditor">Edytor intencji</a>
        <div class="action-stack">
          <a class="btn" id="howto" href="https://drlechk.github.io/smartrosary-howto/howto/010_onoff.html?lang=pl" target="_blank" rel="noopener" data-i18n="howto">Instrukcje</a>

  <footer>
    <span data-i18n="copyright">© 2026 SmartRosary</span>

        },

          headline: 'Rosario inteligente',
          tagline: 'Tu asistente inteligente de oración.',
          dashboard: 'Panel',

          labelLanguage: 'Idioma:',
          promptChrome: 'Esta función requiere Google Chrome. ¿Ir a la página de descarga de Chrome?',
          promptBluefy: 'Esta función requiere el navegador Bluefy en iOS. ¿Abrir el App Store?',
          installChrome: 'Instalar Chrome',
          installBluefy: 'Instalar Bluefy',
          unsupportedChrome: 'Tu navegador actual no es compatible. Utiliza Google Chrome en este dispositivo.',
          unsupportedBluefy: 'Tu navegador actual no es compatible. Utiliza el navegador Bluefy en iOS.'
        },
        pt: {
          description: 'Smart Rosary – rosário inteligente. Painel e instalador de firmware.',
          headline: 'Rosário inteligente',
          tagline: 'O seu assistente inteligente de oração.',
          dashboard: 'Painel',
          companionApp: 'App móvel',
          installer: 'Instalador / Atualizações de firmware',
          intentionsEditor: 'Editor de intenções',
          howto: 'Guia',
          howtoNote: 'O guia ainda não está completo e continua em desenvolvimento.',
          copyright: '© 2026 SmartRosary',
          privacy: 'Política de privacidade',
          deployLabel: 'Última publicação',
          labelLanguage: 'Idioma:',
          promptChrome: 'Esta função requer o Google Chrome. Abrir a página de transferência do Chrome?',
          promptBluefy: 'Esta função requer o navegador Bluefy no iOS. Abrir a App Store?',
          installChrome: 'Instalar o Chrome',
          installBluefy: 'Instalar o Bluefy',
          unsupportedChrome: 'O seu navegador atual não é suportado. Utilize o Google Chrome neste dispositivo.',
          unsupportedBluefy: 'O seu navegador atual não é suportado. Utilize o navegador Bluefy no iOS.'
        }
      };

      const $ = (sel) => document.querySelector(sel);
      const langSelect = $('#lang');
      const label = document.querySelector('label[for="lang"]');

      function applyLang(lang) {
        const dict = strings[lang] || strings[DEFAULT];
        document.documentElement.lang = lang;
        document.title = BRAND;
        const description = document.querySelector('meta[name="description"]');
        if (description) description.setAttribute('content', dict.description);

        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          if (dict[key]) el.textContent = dict[key];
        });
        const privacyLink = document.getElementById('privacy-link');
        if (privacyLink) privacyLink.href = `privacy.html?lang=${encodeURIComponent(lang)}`;
        const howtoLink = document.getElementById('howto');
        if (howtoLink) howtoLink.href = `https://drlechk.github.io/smartrosary-howto/howto/010_onoff.html?lang=${encodeURIComponent(lang)}`;
        if (label) label.textContent = dict.labelLanguage;
        setDeployInfo(dict);
      }

      function setDeployInfo(dict) {
        const deployInfo = document.getElementById('deployInfo');
        if (!deployInfo) return;
        const ts = new Date(document.lastModified);
        const formatted = isNaN(ts.getTime())
          ? ''
          : ts.toLocaleString(undefined, {
              year: 'numeric',
              month: 'short',
              day: 'numeric',
              hour: '2-digit',
              minute: '2-digit'
            });
        const labelText = dict.deployLabel || 'Last deploy';
        deployInfo.setAttribute('aria-label', labelText);
        deployInfo.textContent = formatted ? `${labelText}: ${formatted}` : '';
      }

      // Initialize language from localStorage or default (pl)
      const saved = localStorage.getItem('sr_lang');
      const startLang = (saved && strings[saved]) ? saved : DEFAULT;
      langSelect.value = startLang;
      applyLang(startLang);

      langSelect.addEventListener('change', () => {
        const value = langSelect.value;
        localStorage.setItem('sr_lang', value);
        applyLang(value);
        showCompatInfoIfNeeded();
      });

      // Platform and browser detection
      function detectEnv() {
        const ua = navigator.userAgent || '';
        const uaL = ua.toLowerCase();
        const vendor = (navigator.vendor || '').toLowerCase();
        const platform = (navigator.platform || '').toLowerCase();

        // OS
        let os = 'unknown';
        if (/android/.test(uaL)) os = 'android';
        else if (/iphone|ipad|ipod/.test(uaL)) os = 'ios';
        else if (/mac/.test(platform)) os = 'mac';
        else if (/win/.test(platform)) os = 'windows';
        else if (/linux/.test(platform)) os = 'linux';

        // iPadOS can masquerade as macOS in UA; detect via touch support
        if (os === 'mac' && /macintosh/i.test(ua) && 'ontouchend' in document) {
          os = 'ios';
        }

        // Browser
        let browser = 'unknown';
        if (/bluefy/i.test(ua)) browser = 'bluefy';
        else if (/edg\//i.test(ua)) browser = 'edge';
        else if (/opr\//i.test(ua)) browser = 'opera';
        else if (/samsungbrowser\//i.test(ua)) browser = 'samsung';
        else if (/brave\//i.test(ua)) browser = 'brave';
        else if (/firefox\//i.test(ua)) browser = 'firefox';
        else if (/crios/i.test(ua)) browser = 'chrome'; // Chrome on iOS identifies as CriOS
        else if (/chrome\//i.test(ua) && /google inc/.test(vendor)) browser = 'chrome';
        else if (/safari\//i.test(ua) && /apple/.test(vendor)) browser = 'safari';

        const isSafari = browser === 'safari';
        return { os, browser, isSafari, ua };
      }

      function isSupported(env) {
        const { os, browser } = env;
        if (os === 'android' && browser === 'chrome') return true;
        if (os === 'ios' && browser === 'bluefy') return true;
        if ((os === 'windows' || os === 'mac' || os === 'linux') && browser === 'chrome') return true;
        return false;
      }

      const STORE = {
        chrome_android: 'https://play.google.com/store/apps/details?id=com.android.chrome',
        chrome_desktop: 'https://www.google.com/chrome/',
        bluefy_ios: 'https://apps.apple.com/app/bluefy-web-ble-browser/id1492822055'
      };

      function redirectToStore(env, dict) {
        const { os } = env;
        if (os === 'ios') {
          if (confirm(dict.promptBluefy)) window.open(STORE.bluefy_ios, '_blank');
        } else if (os === 'android') {
          if (confirm(dict.promptChrome)) window.open(STORE.chrome_android, '_blank');
        } else {
          if (confirm(dict.promptChrome)) window.open(STORE.chrome_desktop, '_blank');
        }
      }

      // Try to launch Chrome if installed using URL schemes/intent
      function buildChromeScheme(url) {
        try {
          const u = new URL(url);
          const scheme = u.protocol === 'https:' ? 'googlechromes' : 'googlechrome';
          return scheme + '://' + u.host + u.pathname + u.search + u.hash;
        } catch (_) { return null; }
      }

      function buildAndroidIntent(url) {
        try {
          const u = new URL(url);
          const scheme = u.protocol.replace(':', '');
          return 'intent://' + u.host + u.pathname + u.search + u.hash + '#Intent;scheme=' + scheme + ';package=com.android.chrome;end;';
        } catch (_) { return null; }
      }

      function attemptLaunch(url, onFail, timeout = 1600) {
        let navigated = false;
        const cleanup = () => {
          window.removeEventListener('blur', onBlur, true);
          window.removeEventListener('pagehide', onHide, true);
          document.removeEventListener('visibilitychange', onVis, true);
        };
        const onBlur = () => { navigated = true; cleanup(); };
        const onHide = () => { navigated = true; cleanup(); };
        const onVis = () => { if (document.visibilityState === 'hidden') { navigated = true; cleanup(); } };
        window.addEventListener('blur', onBlur, true);
        window.addEventListener('pagehide', onHide, true);
        document.addEventListener('visibilitychange', onVis, true);

        try { window.location.href = url; } catch (_) {}
        setTimeout(() => { if (!navigated && typeof onFail === 'function') onFail(); cleanup(); }, timeout);
      }

      function attemptIframe(url, onFail, timeout = 1600) {
        if (!url) return typeof onFail === 'function' ? onFail() : undefined;
        let navigated = false;
        const onVis = () => { if (document.visibilityState === 'hidden') navigated = true; cleanup(); };
        const cleanup = () => { document.removeEventListener('visibilitychange', onVis, true); if (iframe && iframe.parentNode) iframe.parentNode.removeChild(iframe); };
        document.addEventListener('visibilitychange', onVis, true);
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = url;
        document.body.appendChild(iframe);
        setTimeout(() => { if (!navigated && typeof onFail === 'function') onFail(); cleanup(); }, timeout);
      }

      function setButtonsDisabled(disabled, dict, reason) {
        const ids = ['dashboard', 'installer', 'intentions-editor'];
        ids.forEach(id => {
          const el = document.getElementById(id);
          if (!el) return;
          if (disabled) {
            el.classList.add('disabled');
            el.setAttribute('aria-disabled', 'true');
            if (reason) el.title = reason;
          } else {
            el.classList.remove('disabled');
            el.removeAttribute('aria-disabled');
            el.removeAttribute('title');
          }
        });
      }

      function showCompatInfoIfNeeded() {
        const env = detectEnv();
        const lang = langSelect.value || DEFAULT;
        const dict = strings[lang] || strings[DEFAULT];
        const box = document.getElementById('compat-notice');
        if (!box) return;
        const supported = isSupported(env);
        if (supported) {
          setButtonsDisabled(false, dict);
          box.classList.remove('show');
          box.innerHTML = '';
          return;
        }
        // Build message and store link depending on platform
        const msg = (env.os === 'ios') ? dict.unsupportedBluefy : dict.unsupportedChrome;
        const linkHref = (env.os === 'ios') ? STORE.bluefy_ios : (env.os === 'android' ? STORE.chrome_android : STORE.chrome_desktop);
        const linkText = (env.os === 'ios') ? dict.installBluefy : dict.installChrome;

        box.innerHTML = '';
        const p = document.createElement('p');
        p.textContent = msg;
        const actions = document.createElement('div');
        actions.className = 'actions';
        const a = document.createElement('a');
        a.className = 'btn';
        a.href = linkHref;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = linkText;
        actions.appendChild(a);
        box.appendChild(p);
        box.appendChild(actions);
        box.classList.add('show');
        setButtonsDisabled(true, dict, msg);
      }

      function showSafariHelp(targetUrl, dict) {
        const box = document.getElementById('compat-notice');
        if (!box) return;
        const texts = {
          pl: {
            msg: 'Safari nie może otworzyć specjalnego łącza. Otwórz Chrome ręcznie i wklej poniższy adres, lub zainstaluj Chrome.',
            copy: 'Kopiuj adres',
            copied: 'Skopiowano!',
            openChrome: 'Strona Chrome',
            openDirect: 'Otwórz w Chrome',
            openAlt: 'Spróbuj alternatywnego łącza'
          },
          en: {
            msg: 'Safari cannot open the special link. Open Chrome manually and paste the address below, or install Chrome.',
            copy: 'Copy address',
            copied: 'Copied!',
            openChrome: 'Chrome site',
            openDirect: 'Open in Chrome',
            openAlt: 'Try alternate link'
          },
          de: {
            msg: 'Safari kann den speziellen Link nicht öffnen. Öffnen Sie Chrome manuell und fügen Sie die Adresse unten ein oder installieren Sie Chrome.',
            copy: 'Adresse kopieren',
            copied: 'Kopiert!',
            openChrome: 'Chrome-Website',
            openDirect: 'In Chrome öffnen',
            openAlt: 'Alternativen Link versuchen'
          },
          fr: {
            msg: 'Safari ne peut pas ouvrir le lien spécial. Ouvrez Chrome manuellement et collez l’adresse ci-dessous, ou installez Chrome.',
            copy: 'Copier l’adresse',
            copied: 'Copié !',
            openChrome: 'Site de Chrome',
            openDirect: 'Ouvrir dans Chrome',
            openAlt: 'Essayer l’autre lien'
          },
          es: {
            msg: 'Safari no puede abrir el enlace especial. Abre Chrome manualmente y pega la dirección siguiente, o instala Chrome.',
            copy: 'Copiar dirección',
            copied: '¡Copiada!',
            openChrome: 'Sitio de Chrome',
            openDirect: 'Abrir en Chrome',
            openAlt: 'Probar enlace alternativo'
          },
          pt: {
            msg: 'O Safari não consegue abrir a ligação especial. Abra o Chrome manualmente e cole o endereço abaixo, ou instale o Chrome.',
            copy: 'Copiar endereço',
            copied: 'Copiado!',
            openChrome: 'Site do Chrome',
            openDirect: 'Abrir no Chrome',
            openAlt: 'Tentar ligação alternativa'
          }
        };
        const locale = (langSelect.value || DEFAULT);
        const t = texts[locale] || texts.en;
        box.innerHTML = '';
        const p = document.createElement('p');
        p.textContent = t.msg;
        const code = document.createElement('code');
        code.style.display = 'block';
        code.style.marginTop = '0.5rem';
        code.style.wordBreak = 'break-all';
        code.textContent = targetUrl;
        const actions = document.createElement('div');
        actions.className = 'actions';
        // Build direct Chrome scheme links
        const httpsScheme = buildChromeScheme(targetUrl.replace(/^http:/, 'https:'));
        const httpScheme = buildChromeScheme(targetUrl.replace(/^https:/, 'http:'));
        const directBtn = document.createElement('a');
        directBtn.className = 'btn';
        directBtn.href = httpsScheme || '#';
        directBtn.textContent = t.openDirect;
        directBtn.target = '_self';
        const altBtn = document.createElement('a');
        altBtn.className = 'btn';
        altBtn.href = httpScheme || '#';
        altBtn.textContent = t.openAlt;
        altBtn.target = '_self';
        const copyBtn = document.createElement('button');
        copyBtn.className = 'btn';
        copyBtn.type = 'button';
        copyBtn.textContent = t.copy;
        copyBtn.addEventListener('click', async () => {
          try { await navigator.clipboard.writeText(targetUrl); copyBtn.textContent = t.copied; setTimeout(()=> copyBtn.textContent = t.copy, 1500); } catch(_) {}
        });
        const chromeBtn = document.createElement('a');
        chromeBtn.className = 'btn';
        chromeBtn.href = STORE.chrome_desktop;
        chromeBtn.target = '_blank';
        chromeBtn.rel = 'noopener';
        chromeBtn.textContent = t.openChrome;
        actions.appendChild(directBtn);
        actions.appendChild(altBtn);
        actions.appendChild(copyBtn);
        actions.appendChild(chromeBtn);
        box.appendChild(p);
        box.appendChild(code);
        box.appendChild(actions);
        box.classList.add('show');
      }

      function attachSmartOpen(id) {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('click', (e) => {
          e.preventDefault();
          const env = detectEnv();
          const lang = langSelect.value || DEFAULT;
          const dict = strings[lang] || strings[DEFAULT];
          if (isSupported(env)) {
            window.open(el.href, '_blank', 'noopener');
          } else {
            if (env.os === 'android') {
              const intentUrl = buildAndroidIntent(el.href);
              return attemptLaunch(intentUrl, () => redirectToStore(env, dict));
            }
            if (env.os === 'mac' || env.os === 'windows' || env.os === 'linux') {
              const httpsScheme = buildChromeScheme(el.href.replace(/^http:/, 'https:'));
              const httpScheme = buildChromeScheme(el.href.replace(/^https:/, 'http:'));
              if (env.isSafari) {
                // Avoid top-level navigation to prevent "invalid address" page
                return attemptIframe(httpsScheme, () => attemptIframe(httpScheme, () => showSafariHelp(el.href, dict)));
              }
              const trySecond = () => attemptLaunch(httpScheme, () => redirectToStore(env, dict));
              return attemptLaunch(httpsScheme, trySecond);
            }
            // iOS and others → store guidance per rules
            redirectToStore(env, dict);
          }
        });
      }

      attachSmartOpen('dashboard');
      attachSmartOpen('installer');
      attachSmartOpen('intentions-editor');
      // On load, set initial compatibility state and notice
      showCompatInfoIfNeeded();
    })();
  </script>
