<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Polityka prywatności – SmartRosary</title>
  <meta id="meta-description" name="description" content="Polityka prywatności aplikacji SmartRosary Companion, panelu internetowego i urządzenia SmartRosary.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    :root {
      --bg: linear-gradient(180deg, #0f5aa0 0%, #0b4f8f 55%, #09457e 100%);
      --text: #14223d;
      --muted: #5b6b86;
      --card: #fffffff2;
      --border: #b7d6f5;
      --accent: #0974cc;
      --accent-soft: #e8f3fd;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; background: var(--bg); scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      color: var(--text);
      background: var(--bg);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }

    header {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      color: #fff;
      font-weight: 650;
      text-decoration: none;
    }
    .home-link img { width: 32px; height: 32px; }
    .home-link:hover span { text-decoration: underline; text-underline-offset: 0.2em; }

    .lang {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: #fff;
      font-size: 0.9rem;
    }
    select {
      padding: 0.4rem 0.6rem;
      border: 1px solid rgba(255,255,255,0.65);
      border-radius: 8px;
      background: transparent;
      color: #fff;
      font: inherit;
    }
    select:focus { outline: 2px solid #fff; outline-offset: 2px; }
    select option { color: #111; }

    main {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 1rem 1.25rem 3rem;
      flex: 1;
    }
    .card {
      background: var(--card);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: clamp(1.25rem, 4vw, 2.5rem);
      box-shadow: 0 10px 30px #00000014;
    }
    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      line-height: 1.2;
    }
    .updated { margin: 0.35rem 0 1.5rem; color: var(--muted); }
    .summary {
      margin: 1.25rem 0 1.75rem;
      padding: 1rem 1.1rem;
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 10px;
      background: var(--accent-soft);
    }
    .summary p { margin: 0; }
    h2 {
      margin: 2rem 0 0.65rem;
      color: #0b4f8f;
      font-size: 1.25rem;
      line-height: 1.3;
    }
    p { margin: 0.55rem 0; }
    ul { margin: 0.55rem 0; padding-left: 1.35rem; }
    li + li { margin-top: 0.35rem; }
    a { color: #075fa8; }
    a:hover { color: #043f71; }
    .contact {
      padding: 0.85rem 1rem;
      border-radius: 10px;
      background: #f5f8fc;
    }

    footer {
      padding: 1rem 1.25rem 1.5rem;
      color: rgba(255,255,255,0.88);
      text-align: center;
      font-size: 0.9rem;
    }
    .deploy-info {
      margin-top: 0.35rem;
      font-size: 0.72rem;
      letter-spacing: 0.02em;
      opacity: 0.78;
    }

    @media (max-width: 560px) {
      header { align-items: center; }
      .home-link span { display: none; }
      .lang { min-width: 0; }
      .lang label {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .lang select { width: 8.5rem; max-width: calc(100vw - 6rem); }
    }
  </style>
</head>
<body>
  <header>
    <a class="home-link" href="index.html">
      <img src="favicon.svg" alt="">
      <span>Smart Rosary</span>
    </a>
    <div class="lang">
      <label id="language-label" for="lang">Język:</label>
      <select id="lang" aria-labelledby="language-label">
        <option value="pl">Polski</option>
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="pt">Português</option>
      </select>
    </div>
  </header>

  <main>
    <article class="card" id="privacy-content"></article>
  </main>

  <footer>
    <span>© 2026 SmartRosary</span>
    <div id="deployInfo" class="deploy-info" aria-label="Ostatnie wdrożenie"></div>
  </footer>

  <script>
    (function () {
      const CONTACT = '<a href="mailto:drlechko@gmail.com">drlechko@gmail.com</a>';
      const GITHUB_PRIVACY = '<a href="https://docs.github.com/en/site-policy/privacy-policies/github-general-privacy-statement" target="_blank" rel="noopener">GitHub Privacy Statement</a>';
      const GITHUB_PAGES = '<a href="https://docs.github.com/en/pages/getting-started-with-github-pages/what-is-github-pages#data-collection" target="_blank" rel="noopener">GitHub Pages</a>';
      const APPLE_PRIVACY = '<a href="https://www.apple.com/legal/privacy/" target="_blank" rel="noopener">Apple Privacy Policy</a>';

      const copy = {
        pl: {
          pageTitle: 'Polityka prywatności – SmartRosary',
          description: 'Polityka prywatności aplikacji SmartRosary Companion, panelu internetowego i urządzenia SmartRosary.',
          language: 'Język:',
          deployLabel: 'Ostatnie wdrożenie',
          title: 'Polityka prywatności',
          updated: 'Ostatnia aktualizacja: 6 lipca 2026 r.',
          summary: '<strong>W skrócie:</strong> SmartRosary Companion nie wymaga konta, nie zawiera reklam, analityki ani mechanizmów śledzenia. Intencje, ustawienia, historia i statystyki pozostają lokalnie w aplikacji, przeglądarce lub na różańcu. Dane urządzenia są wymieniane bezpośrednio między telefonem lub przeglądarką a urządzeniem SmartRosary przez Bluetooth Low Energy (BLE); nie są przesyłane do operatora SmartRosary.',
          sections: [
            ['1. Administrator', '<p>Administratorem w zakresie opisanym poniżej jest projekt SmartRosary (osoba odpowiedzialna: Lech K.). Kontakt: ' + CONTACT + '.</p><p>Nie wyznaczono inspektora ochrony danych, ponieważ nie istnieje taki obowiązek.</p>'],
            ['2. Zakres informacji', '<p>Niniejsza polityka dotyczy aplikacji <strong>SmartRosary Companion</strong> na iOS i Androida, internetowego panelu SmartRosary, urządzenia SmartRosary oraz tej strony internetowej. Opisuje zarówno dane pozostające wyłącznie lokalnie, jak i techniczne dane połączenia powstające podczas pobierania strony lub aktualizacji.</p>'],
            ['3. Aplikacja i komunikacja Bluetooth', '<ul><li>Aplikacja skanuje w pobliżu urządzenia SmartRosary i, po udzieleniu uprawnienia systemowego, łączy się z wybranym różańcem przez BLE.</li><li>Przez BLE mogą być odczytywane lub zapisywane m.in. identyfikator i status urządzenia, ustawienia, poziom baterii, wersje oprogramowania i języka, intencje, harmonogramy, historia modlitwy, statystyki, tapety oraz pakiety aktualizacji.</li><li>Ta komunikacja odbywa się bezpośrednio i lokalnie. Operator SmartRosary nie otrzymuje jej treści.</li><li>Aplikacja nie wykorzystuje danych Bluetooth do śledzenia lokalizacji.</li></ul>'],
            ['4. Dane przechowywane lokalnie', '<p>Aplikacja może zapisywać w swojej chronionej przestrzeni: sparowane urządzenia i techniczne dane parowania, ustawienia aplikacji, ostatnio zsynchronizowane dane, kopie zapasowe utworzone przez użytkownika oraz wybrane pliki. Dane te służą wyłącznie funkcjom aplikacji i dostępowi offline.</p><p>Wybrane zdjęcie lub obraz tapety jest przetwarzany lokalnie i przesyłany wyłącznie do połączonego różańca. Nie jest wysyłany do operatora ani usługi chmurowej. Dostęp do zdjęć lub aparatu następuje tylko po wyborze odpowiedniej funkcji i po udzieleniu uprawnienia.</p><p>Dane lokalne można usuwać w odpowiednich funkcjach aplikacji, przez rozparowanie/reset urządzenia lub odinstalowanie aplikacji. Dane na różańcu pozostają do czasu ich zmiany, usunięcia lub przywrócenia urządzenia do ustawień fabrycznych.</p>'],
            ['5. Panel internetowy i urządzenie', '<p>Panel internetowy korzysta z Web Bluetooth. Odczytane ustawienia, intencje, historia i statystyki są przetwarzane w przeglądarce i wymieniane lokalnie z różańcem; nie są przesyłane do operatora SmartRosary. Przeglądarka może lokalnie zachować niezbędne preferencje, np. język.</p><p>Samo urządzenie SmartRosary nie wysyła danych do Internetu. Przechowuje swoje ustawienia i treści lokalnie i udostępnia je przez BLE dopiero po połączeniu przez użytkownika.</p>'],
            ['6. Dostęp do strony i aktualizacje', '<p>Strona oraz pliki firmware, językowe i intencji są udostępniane przez GitHub Pages. Podczas otwierania strony, sprawdzania wersji lub pobierania pliku urządzenie łączy się przez HTTPS z serwerami GitHub. W takim żądaniu technicznie przekazywane są w szczególności adres IP, czas, żądany adres pliku oraz informacje typowe dla klienta HTTP. Żadne intencje, statystyki, historie modlitwy ani ustawienia różańca nie są dołączane do tych żądań.</p><p>GitHub informuje, że adresy IP odwiedzających GitHub Pages są rejestrowane w celach bezpieczeństwa. Szczegóły: ' + GITHUB_PAGES + ' i ' + GITHUB_PRIVACY + '.</p><p>Dystrybucja aplikacji przez App Store lub Google Play podlega również zasadom odpowiedniego operatora platformy. Informacje o Apple: ' + APPLE_PRIVACY + '.</p>'],
            ['7. Cele, podstawy prawne i okres przechowywania', '<p>Lokalne przetwarzanie jest wykonywane na żądanie użytkownika w celu zapewnienia funkcji aplikacji i urządzenia. Ponieważ operator nie ma dostępu do tych danych, nie są one przechowywane na jego serwerach.</p><p>Techniczne dane połączenia przy udostępnianiu stron i aktualizacji są przetwarzane w celu bezpiecznego, stabilnego dostarczania usługi oraz zapobiegania nadużyciom, na podstawie art. 6 ust. 1 lit. f RODO. Uzasadnionym interesem jest bezpieczne udostępnianie strony i oprogramowania. Okres przechowywania tych danych ustala GitHub zgodnie ze swoimi zasadami.</p>'],
            ['8. Odbiorcy i transfery do państw trzecich', '<p>Operator SmartRosary nie sprzedaje danych i nie przekazuje danych modlitewnych, intencji, historii ani ustawień osobom trzecim. Przy korzystaniu z hostowanych stron i pobieraniu aktualizacji odbiorcą technicznych danych połączenia może być GitHub, Inc. Szczegóły dotyczące lokalizacji przetwarzania i stosowanych zabezpieczeń znajdują się w oświadczeniu GitHub dotyczącym prywatności.</p>'],
            ['9. Prawa użytkownika', '<p>W zakresie, w jakim administrator przetwarza dane osobowe, użytkownik ma prawo do informacji, dostępu, sprostowania, usunięcia, ograniczenia przetwarzania, przenoszenia danych oraz sprzeciwu zgodnie z warunkami RODO. Ma również prawo złożyć skargę do właściwego organu nadzorczego, w szczególności w państwie swojego zwykłego pobytu, miejsca pracy lub domniemanego naruszenia.</p><p>Ponieważ dane funkcjonalne SmartRosary pozostają lokalnie i operator nie ma do nich dostępu, operator zwykle nie może odtworzyć, wyeksportować ani usunąć ich zdalnie. Użytkownik zarządza nimi bezpośrednio w aplikacji, przeglądarce i urządzeniu.</p>'],
            ['10. Bezpieczeństwo i zmiany polityki', '<p>Komunikacja odbywa się w ramach uprawnień i mechanizmów bezpieczeństwa systemu operacyjnego oraz protokołu SmartRosary. Użytkownik powinien chronić dostęp do telefonu i kopii zapasowych.</p><p>Polityka może zostać zaktualizowana, jeśli zmienią się funkcje, dostawcy lub wymogi prawne. Aktualna wersja jest zawsze dostępna pod tym adresem.</p>'],
            ['11. Kontakt', '<p class="contact">Pytania dotyczące prywatności: ' + CONTACT + '</p>']
          ]
        },
        en: {
          pageTitle: 'Privacy Policy – SmartRosary',
          description: 'Privacy policy for the SmartRosary Companion app, web dashboard and SmartRosary device.',
          language: 'Language:',
          deployLabel: 'Last deploy',
          title: 'Privacy Policy',
          updated: 'Last updated: 6 July 2026',
          summary: '<strong>In short:</strong> SmartRosary Companion requires no account and contains no advertising, analytics or tracking. Intentions, settings, history and statistics remain locally in the app, browser or rosary. Device data is exchanged directly between the phone or browser and the SmartRosary device via Bluetooth Low Energy (BLE); it is not transmitted to the SmartRosary operator.',
          sections: [
            ['1. Controller', '<p>The controller for the processing described below is the SmartRosary project (responsible person: Lech K.). Contact: ' + CONTACT + '.</p><p>No data protection officer has been appointed because there is no legal obligation to do so.</p>'],
            ['2. Scope', '<p>This policy applies to the <strong>SmartRosary Companion</strong> app for iOS and Android, the SmartRosary web dashboard, the SmartRosary device and this website. It covers both data that remains exclusively local and technical connection data generated when pages or updates are downloaded.</p>'],
            ['3. App and Bluetooth communication', '<ul><li>The app scans for nearby SmartRosary devices and, after system permission is granted, connects to the selected rosary via BLE.</li><li>BLE may read or write the device identifier and status, settings, battery level, firmware and language versions, intentions, schedules, prayer history, statistics, wallpapers and update packages.</li><li>This communication is direct and local. The SmartRosary operator does not receive its contents.</li><li>The app does not use Bluetooth data to track location.</li></ul>'],
            ['4. Locally stored data', '<p>The app may store paired devices and technical pairing data, app preferences, last synchronised data, user-created backups and selected files in its protected app storage. This data is used only for app functions and offline access.</p><p>A selected wallpaper photo or image is processed locally and transferred only to the connected rosary. It is not uploaded to the operator or a cloud service. Photo or camera access occurs only when the relevant function is selected and permission is granted.</p><p>Local data can be removed through the relevant app functions, by unpairing/resetting the device or by uninstalling the app. Data on the rosary remains until it is changed, deleted or the device is factory-reset.</p>'],
            ['5. Web dashboard and device', '<p>The web dashboard uses Web Bluetooth. Settings, intentions, history and statistics read from the rosary are processed in the browser and exchanged locally with the rosary; they are not sent to the SmartRosary operator. The browser may store necessary preferences such as language locally.</p><p>The SmartRosary device itself does not transmit data to the Internet. It stores settings and content locally and exposes them via BLE only after the user connects.</p>'],
            ['6. Website access and updates', '<p>The website and firmware, language and intentions files are provided through GitHub Pages. When opening a page, checking a version or downloading a file, the device connects to GitHub servers via HTTPS. The request necessarily includes technical data such as the IP address, time, requested file address and ordinary HTTP client information. No intentions, statistics, prayer history or rosary settings are attached to these requests.</p><p>GitHub states that visitor IP addresses are logged for GitHub Pages security. See ' + GITHUB_PAGES + ' and the ' + GITHUB_PRIVACY + '.</p><p>Distribution through the App Store or Google Play is also subject to the respective platform operator’s terms. Apple information: ' + APPLE_PRIVACY + '.</p>'],
            ['7. Purposes, legal bases and retention', '<p>Local processing is performed at the user’s request to provide app and device functions. As the operator has no access to this data, it is not stored on the operator’s servers.</p><p>Technical connection data used to provide pages and updates is processed to deliver the service securely and reliably and to prevent misuse, based on Article 6(1)(f) GDPR. The legitimate interest is the secure provision of the website and software. GitHub determines retention periods for this data under its policies.</p>'],
            ['8. Recipients and international transfers', '<p>The SmartRosary operator does not sell data or disclose prayer data, intentions, history or settings to third parties. When hosted pages or updates are accessed, GitHub, Inc. may receive technical connection data. Details of processing locations and safeguards are provided in GitHub’s privacy statement.</p>'],
            ['9. Your rights', '<p>Where the controller processes personal data, you have rights to information, access, rectification, erasure, restriction, data portability and objection under the conditions of the GDPR. You may lodge a complaint with a competent supervisory authority, in particular in the country of your habitual residence, place of work or the alleged infringement.</p><p>Because SmartRosary functional data remains local and the operator cannot access it, the operator generally cannot retrieve, export or erase it remotely. You manage it directly in the app, browser and device.</p>'],
            ['10. Security and policy changes', '<p>Communication operates within the permissions and security mechanisms of the operating system and the SmartRosary protocol. Users should protect access to their phone and backups.</p><p>This policy may be updated if functions, providers or legal requirements change. The current version is always available at this URL.</p>'],
            ['11. Contact', '<p class="contact">Privacy questions: ' + CONTACT + '</p>']
          ]
        },
        de: {
          pageTitle: 'Datenschutzerklärung – SmartRosary',
          description: 'Datenschutzerklärung für die SmartRosary Companion App, das Web-Dashboard und das SmartRosary-Gerät.',
          language: 'Sprache:',
          deployLabel: 'Letztes Deployment',
          title: 'Datenschutzerklärung',
          updated: 'Stand: 6. Juli 2026',
          summary: '<strong>Kurz gesagt:</strong> SmartRosary Companion benötigt kein Konto und enthält weder Werbung noch Analyse- oder Trackingdienste. Intentionen, Einstellungen, Verlauf und Statistiken bleiben lokal in App, Browser oder Rosenkranz. Gerätedaten werden direkt zwischen Telefon bzw. Browser und dem SmartRosary-Gerät über Bluetooth Low Energy (BLE) ausgetauscht; sie werden nicht an den SmartRosary-Betreiber übertragen.',
          sections: [
            ['1. Verantwortlicher', '<p>Verantwortlicher für die nachfolgend beschriebene Verarbeitung ist das SmartRosary-Projekt (verantwortliche Person: Lech K.). Kontakt: ' + CONTACT + '.</p><p>Ein Datenschutzbeauftragter wurde nicht bestellt, da keine gesetzliche Verpflichtung hierzu besteht.</p>'],
            ['2. Geltungsbereich', '<p>Diese Erklärung gilt für die <strong>SmartRosary Companion</strong> App für iOS und Android, das SmartRosary-Web-Dashboard, das SmartRosary-Gerät und diese Website. Sie beschreibt sowohl ausschließlich lokal verbleibende Daten als auch technische Verbindungsdaten beim Abruf von Seiten und Updates.</p>'],
            ['3. App und Bluetooth-Kommunikation', '<ul><li>Die App sucht nach SmartRosary-Geräten in der Nähe und verbindet sich nach Erteilung der Systemberechtigung per BLE mit dem ausgewählten Rosenkranz.</li><li>Über BLE können insbesondere Gerätekennung und -status, Einstellungen, Akkustand, Firmware- und Sprachversionen, Intentionen, Zeitpläne, Gebetsverlauf, Statistiken, Hintergrundbilder und Updatepakete gelesen oder geschrieben werden.</li><li>Diese Kommunikation erfolgt direkt und lokal. Der SmartRosary-Betreiber erhält deren Inhalte nicht.</li><li>Bluetooth-Daten werden nicht zur Standortverfolgung verwendet.</li></ul>'],
            ['4. Lokal gespeicherte Daten', '<p>Die App kann gekoppelte Geräte und technische Kopplungsdaten, App-Einstellungen, zuletzt synchronisierte Daten, vom Nutzer erstellte Sicherungen und ausgewählte Dateien in ihrem geschützten App-Speicher ablegen. Diese Daten dienen ausschließlich den App-Funktionen und dem Offline-Zugriff.</p><p>Ein ausgewähltes Foto oder Hintergrundbild wird lokal verarbeitet und nur an den verbundenen Rosenkranz übertragen. Es wird weder zum Betreiber noch in einen Cloud-Dienst hochgeladen. Der Zugriff auf Fotos oder Kamera erfolgt nur nach Auswahl der entsprechenden Funktion und Erteilung der Berechtigung.</p><p>Lokale Daten können über die jeweiligen App-Funktionen, durch Entkoppeln/Zurücksetzen oder durch Deinstallation entfernt werden. Daten auf dem Rosenkranz bleiben gespeichert, bis sie geändert, gelöscht oder das Gerät auf Werkseinstellungen zurückgesetzt wird.</p>'],
            ['5. Web-Dashboard und Gerät', '<p>Das Web-Dashboard verwendet Web Bluetooth. Vom Rosenkranz gelesene Einstellungen, Intentionen, Verläufe und Statistiken werden im Browser verarbeitet und lokal mit dem Rosenkranz ausgetauscht; sie werden nicht an den SmartRosary-Betreiber gesendet. Der Browser kann notwendige Einstellungen wie die Sprachauswahl lokal speichern.</p><p>Das SmartRosary-Gerät selbst überträgt keine Daten ins Internet. Es speichert Einstellungen und Inhalte lokal und stellt sie erst nach einer vom Nutzer hergestellten Verbindung per BLE bereit.</p>'],
            ['6. Websiteabrufe und Updates', '<p>Die Website sowie Firmware-, Sprach- und Intentionendateien werden über GitHub Pages bereitgestellt. Beim Öffnen einer Seite, Prüfen einer Version oder Herunterladen einer Datei verbindet sich das Gerät per HTTPS mit GitHub-Servern. Dabei werden technisch insbesondere IP-Adresse, Zeitpunkt, angeforderte Dateiadresse und übliche Informationen des HTTP-Clients übertragen. Intentionen, Statistiken, Gebetsverläufe oder Rosenkranz-Einstellungen werden diesen Anfragen nicht beigefügt.</p><p>GitHub weist darauf hin, dass IP-Adressen von GitHub-Pages-Besuchern zu Sicherheitszwecken protokolliert werden. Einzelheiten: ' + GITHUB_PAGES + ' und ' + GITHUB_PRIVACY + '.</p><p>Für die Verteilung über App Store oder Google Play gelten daneben die Bestimmungen des jeweiligen Plattformbetreibers. Informationen von Apple: ' + APPLE_PRIVACY + '.</p>'],
            ['7. Zwecke, Rechtsgrundlagen und Speicherdauer', '<p>Die lokale Verarbeitung erfolgt auf Wunsch des Nutzers zur Bereitstellung der App- und Gerätefunktionen. Da der Betreiber auf diese Daten nicht zugreifen kann, werden sie nicht auf seinen Servern gespeichert.</p><p>Technische Verbindungsdaten beim Bereitstellen von Seiten und Updates werden zur sicheren und stabilen Auslieferung sowie zur Missbrauchsabwehr auf Grundlage von Art. 6 Abs. 1 lit. f DSGVO verarbeitet. Das berechtigte Interesse liegt in der sicheren Bereitstellung von Website und Software. Die Speicherdauer dieser Daten bestimmt GitHub nach seinen Richtlinien.</p>'],
            ['8. Empfänger und Drittlandübermittlungen', '<p>Der SmartRosary-Betreiber verkauft keine Daten und gibt Gebetsdaten, Intentionen, Verläufe oder Einstellungen nicht an Dritte weiter. Beim Abruf gehosteter Seiten und Updates kann GitHub, Inc. technische Verbindungsdaten empfangen. Angaben zu Verarbeitungsorten und Schutzmaßnahmen enthält die Datenschutzerklärung von GitHub.</p>'],
            ['9. Rechte betroffener Personen', '<p>Soweit der Verantwortliche personenbezogene Daten verarbeitet, bestehen nach den Voraussetzungen der DSGVO Rechte auf Auskunft, Berichtigung, Löschung, Einschränkung der Verarbeitung, Datenübertragbarkeit und Widerspruch. Zudem besteht ein Beschwerderecht bei einer zuständigen Datenschutzaufsichtsbehörde, insbesondere am gewöhnlichen Aufenthaltsort, Arbeitsplatz oder Ort des mutmaßlichen Verstoßes.</p><p>Da SmartRosary-Funktionsdaten lokal verbleiben und der Betreiber keinen Zugriff darauf hat, kann er diese regelmäßig nicht aus der Ferne abrufen, exportieren oder löschen. Die Verwaltung erfolgt direkt in App, Browser und Gerät.</p>'],
            ['10. Sicherheit und Änderungen', '<p>Die Kommunikation erfolgt im Rahmen der Berechtigungs- und Sicherheitsmechanismen des Betriebssystems und des SmartRosary-Protokolls. Nutzer sollten den Zugriff auf Telefon und Sicherungen schützen.</p><p>Diese Erklärung kann angepasst werden, wenn sich Funktionen, Anbieter oder rechtliche Anforderungen ändern. Die aktuelle Fassung ist stets unter dieser URL abrufbar.</p>'],

      const selector = document.getElementById('lang');
      const content = document.getElementById('privacy-content');
      const label = document.getElementById('language-label');
      const description = document.getElementById('meta-description');

      function supportedLanguage(value) {
        return Object.prototype.hasOwnProperty.call(copy, value) ? value : null;
      }

      function render(language, updateUrl) {
        const lang = supportedLanguage(language) || 'pl';
        const t = copy[lang];
        document.documentElement.lang = lang;
        document.title = t.pageTitle;
        description.setAttribute('content', t.description);
        label.textContent = t.language;
        selector.value = lang;
        setDeployInfo(t);

        const sections = t.sections.map(([heading, body]) =>
          '<section><h2>' + heading + '</h2>' + body + '</section>'
        ).join('');
        content.innerHTML =
          '<h1>' + t.title + '</h1>' +
          '<p class="updated">' + t.updated + '</p>' +
          '<div class="summary"><p>' + t.summary + '</p></div>' +
          sections;

        localStorage.setItem('sr_privacy_lang', lang);
        if (['pl', 'en', 'de'].includes(lang)) localStorage.setItem('sr_lang', lang);
        if (updateUrl) {
          const url = new URL(window.location.href);
          url.searchParams.set('lang', lang);
          history.replaceState(null, '', url);
        }
      }

      function setDeployInfo(t) {
        const deployInfo = document.getElementById('deployInfo');
        if (!deployInfo) return;
        const ts = new Date(document.lastModified);
        const formatted = isNaN(ts.getTime())
          ? ''
          : ts.toLocaleString(undefined, {
              year: 'numeric',
              month: 'short',
              day: 'numeric',
              hour: '2-digit',
              minute: '2-digit'
            });
        const labelText = t.deployLabel || 'Last deploy';
        deployInfo.setAttribute('aria-label', labelText);
        deployInfo.textContent = formatted ? `${labelText}: ${formatted}` : '';
      }

      const requested = supportedLanguage(new URLSearchParams(location.search).get('lang'));
      const saved = supportedLanguage(localStorage.getItem('sr_privacy_lang'));
      const browserLanguage = supportedLanguage((navigator.language || '').slice(0, 2).toLowerCase());
      render(requested || saved || browserLanguage || 'pl', false);

      selector.addEventListener('change', function () {
        render(selector.value, true);
      });
    })();
  </script>
